<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coatlani Font Test</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
 <table class="alphabet">
  <thead>
    <tr>
      <th>English</th>
      <th>Coatlani</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>A</td><td>A</td></tr>
    <tr><td>C</td><td>C</td></tr>
    <tr><td>E</td><td>E</td></tr>
    <tr><td>H</td><td>H</td></tr>
    <tr><td>I</td><td>I</td></tr>
    <tr><td>L</td><td>L</td></tr>
    <tr><td>M</td><td>M</td></tr>
    <tr><td>N</td><td>N</td></tr>
    <tr><td>O</td><td>O</td></tr>
    <tr><td>P</td><td>P</td></tr>
    <tr><td>Q</td><td>Q</td></tr>
    <tr><td>T</td><td>T</td></tr>
    <tr><td>U</td><td>U</td></tr>
    <tr><td>X</td><td>X</td></tr>
    <tr><td>Y</td><td>Y</td></tr>
    <tr><td>TL</td><td>[</td></tr>
   <tr><td>TZ</td><td>&#92;</td></tr>
    <tr><td>CH</td><td>]</td></tr>
    <tr><td>CU / UC</td><td>,</td></tr>
    <tr><td>HU / UH</td><td>.</td></tr>
    <tr><td>QU</td><td>;</td></tr>
  </tbody>
</table>
   <table class="alphabet">
  <thead>
    <tr>
      <th>English</th>
      <th>Expanded Coatlani</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>B</td><td>B</td></tr>
    <tr><td>D</td><td>D</td></tr>
    <tr><td>F</td><td>F</td></tr>
    <tr><td>G</td><td>G</td></tr>
    <tr><td>J</td><td>J</td></tr>
    <tr><td>K</td><td>K</td></tr>
    <tr><td>R</td><td>R</td></tr>
    <tr><td>S</td><td>S</td></tr>
    <tr><td>V</td><td>V</td></tr>
    <tr><td>W</td><td>W</td></tr>
    <tr><td>Q</td><td>Q</td></tr>
    <tr><td>T</td><td>T</td></tr>
    <tr><td>U</td><td>U</td></tr>
    <tr><td>X</td><td>X</td></tr>
    <tr><td>Z</td><td>Z</td></tr>
  </tbody>
</table>
  
 <div class="card" style="margin-top:24px;">
  <h2 style="margin:0 0 12px 0;">Live Translator</h2>

  <div class="live">
    <div class="box">
      <div class="label">English</div>
      <textarea id="englishInput" placeholder="Type here..."></textarea>
    </div>

    <div class="box">
      <div class="label">Coatlani</div>
      <div id="coatlaniOutput" class="coatlaniOutput"></div>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById("englishInput");
  const output = document.getElementById("coatlaniOutput");

  function toCoatlani(text) {
    // Normalize to uppercase so matching is easy (your mapping table is uppercase)
    let t = text.toUpperCase();

    // Order matters: do longer / more specific patterns first.
    // Use word-boundary-ish logic? Not needed here; we want it anywhere in the text.
    t = t
      .replace(/TL/g, "[")
      .replace(/TZ/g, "\\")   // backslash in JS string needs escaping
      .replace(/CH/g, "]")
      .replace(/CU/g, ",")
      .replace(/UC/g, ",")
      .replace(/HU/g, ".")
      .replace(/UH/g, ".")
      .replace(/QU/g, ";");

    return t;
  }

  function update() {
    output.textContent = toCoatlani(input.value);
  }

  input.addEventListener("input", update);
  update();
</script>
</body>
</html>
