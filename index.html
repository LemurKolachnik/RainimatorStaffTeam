<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coatlani Font Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <table class="alphabet">
  <thead>
    <tr>
      <th>English</th>
      <th>Coatlani</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>A</td><td class="coatlani">A</td></tr>
    <tr><td>C</td><td class="coatlani">C</td></tr>
    <tr><td>E</td><td class="coatlani">E</td></tr>
    <tr><td>H</td><td class="coatlani">H</td></tr>
    <tr><td>I</td><td class="coatlani">I</td></tr>
    <tr><td>L</td><td class="coatlani">L</td></tr>
    <tr><td>M</td><td class="coatlani">M</td></tr>
    <tr><td>N</td><td class="coatlani">N</td></tr>
    <tr><td>O</td><td class="coatlani">O</td></tr>
    <tr><td>P</td><td class="coatlani">P</td></tr>
    <tr><td>Q</td><td class="coatlani">Q</td></tr>
    <tr><td>T</td><td class="coatlani">T</td></tr>
    <tr><td>U</td><td class="coatlani">U</td></tr>
    <tr><td>X</td><td class="coatlani">X</td></tr>
    <tr><td>TL</td><td class="coatlani">[</td></tr>
    <tr><td>TZ</td><td class="coatlani">\</td></tr>
    <tr><td>CH</td><td class="coatlani">]</td></tr>
    <tr><td>CU / UC</td><td class="coatlani">,</td></tr>
    <tr><td>HU / UH</td><td class="coatlani">.</td></tr>
    <tr><td>QU</td><td class="coatlani">;</td></tr>
  </tbody>
</table>
</body>
</html>
